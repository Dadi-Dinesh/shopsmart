name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  client:
    name: Client – Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: client
        run: npx playwright install --with-deps

      - name: Run code formatting check
        working-directory: client
        run: npm run format:check

      - name: Run linter
        working-directory: client
        run: npm run lint

      - name: Run unit tests
        working-directory: client
        run: npm run test -- --run --reporter=junit --outputFile=unit-test-results.xml

      - name: Upload client unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-unit-test-report
          path: client/unit-test-results.xml
          retention-days: 30

      - name: Run client integration tests
        working-directory: client
        run: npm run test:integration -- --reporter=junit --outputFile=integration-test-results.xml

      - name: Upload client integration test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-integration-test-report
          path: client/integration-test-results.xml
          retention-days: 30

      - name: Install server dependencies for E2E
        working-directory: server
        run: npm ci

      - name: Run E2E tests
        working-directory: client
        run: npm run test:e2e

      - name: Upload playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 30

      - name: Build
        working-directory: client
        run: npm run build

  server:
    name: Server – Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Run code formatting check
        working-directory: server
        run: npm run format:check

      - name: Run linter
        working-directory: server
        run: npm run lint

      - name: Run unit tests
        working-directory: server
        run: npm run test -- --reporter xunit --reporter-options output=unit-test-results.xml

      - name: Upload server unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-unit-test-report
          path: server/unit-test-results.xml
          retention-days: 30

      - name: Run integration tests
        working-directory: server
        run: npm run test:integration -- --reporter xunit --reporter-options output=integration-test-results.xml

      - name: Upload server integration test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-integration-test-report
          path: server/integration-test-results.xml
          retention-days: 30
