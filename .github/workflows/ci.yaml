name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  client:
    name: Client – Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Run unit tests
        working-directory: client
        run: npm run test -- --run --reporter=junit --outputFile=unit-test-results.xml

      - name: Upload client unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-unit-test-report
          path: client/unit-test-results.xml
          retention-days: 30

      - name: Run client integration tests
        working-directory: client
        run: npm run test:integration -- --reporter=junit --outputFile=integration-test-results.xml

      - name: Upload client integration test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-integration-test-report
          path: client/integration-test-results.xml
          retention-days: 30

  server:
    name: Server – Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Run unit tests
        working-directory: server
        run: npm run test -- --reporter xunit --reporter-options output=unit-test-results.xml

      - name: Upload server unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-unit-test-report
          path: server/unit-test-results.xml
          retention-days: 30

      - name: Run integration tests
        working-directory: server
        run: npm run test:integration -- --reporter xunit --reporter-options output=integration-test-results.xml

      - name: Upload server integration test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-integration-test-report
          path: server/integration-test-results.xml
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────
  # Phase 2 — Infrastructure Provisioning (Terraform)
  # Provisions an S3 bucket with versioning, encryption & public-access block
  # ────────────────────────────────────────────────────────────────────────
  terraform:
    name: Terraform – S3 Infrastructure
    runs-on: ubuntu-latest
    needs: [client, server]

    defaults:
      run:
        working-directory: infra/terraform

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var="aws_region=${{ secrets.AWS_REGION }}" -out=tfplan -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false tfplan

      - name: Show Terraform Outputs
        run: terraform output
