name: Deploy ShopSmart to EC2 (Ubuntu + Nginx)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (for frontend build)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: ./client
        run: |
          npm install
          npm run build

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

      - name: Add EC2 Host to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy ShopSmart to EC2
        run: |
            # Copy the BUILT dist folder over SCP 
            scp -i ~/.ssh/ec2_key.pem -r client/dist ubuntu@${{ secrets.EC2_HOST }}:/tmp/client_dist
            
            # Copy nginx.conf over SCP
            scp -i ~/.ssh/ec2_key.pem infra/nginx.conf ubuntu@${{ secrets.EC2_HOST }}:/tmp/nginx.conf

            # Copy server folder over SCP (excluding node_modules)
            tar -czf server.tar.gz --exclude=node_modules server
            scp -i ~/.ssh/ec2_key.pem server.tar.gz ubuntu@${{ secrets.EC2_HOST }}:/tmp/server.tar.gz

            # Replace the application folder with the fresh build and apply Nginx config
            ssh -i ~/.ssh/ec2_key.pem ubuntu@${{ secrets.EC2_HOST }} "
            # Prepare frontend
            sudo mkdir -p /var/www/shopsmart/client
            sudo rm -rf /var/www/shopsmart/client/* &&
            sudo cp -r /tmp/client_dist/* /var/www/shopsmart/client/ &&
            sudo rm -rf /tmp/client_dist &&

            # Prepare server
            sudo mkdir -p /var/www/shopsmart/server
            sudo rm -rf /var/www/shopsmart/server/* &&
            tar -xzf /tmp/server.tar.gz -C /tmp &&
            sudo cp -r /tmp/server/* /var/www/shopsmart/server/ &&
            sudo rm -rf /tmp/server.tar.gz /tmp/server &&
            
            # Install server dependencies and start/restart with PM2
            cd /var/www/shopsmart/server &&
            npm install --production &&
            pm2 delete shopsmart-backend || true &&
            pm2 start src/index.js --name shopsmart-backend &&

            # Apply Nginx configuration
            sudo mv /tmp/nginx.conf /etc/nginx/sites-available/shopsmart &&
            sudo ln -sf /etc/nginx/sites-available/shopsmart /etc/nginx/sites-enabled/default &&
            
            # Restart Nginx
            sudo systemctl restart nginx
            "