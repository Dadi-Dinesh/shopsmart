name: Deploy ShopSmart to EC2 (Ubuntu + Nginx)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (for frontend build)
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: ./client
        run: |
          npm install
          npm run build

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

      - name: Add EC2 Host to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy ShopSmart to EC2 nginx root
        run: |
          # Copy the BUILT dist folder over SCP 
          scp -i ~/.ssh/ec2_key.pem -r client/dist ubuntu@${{ secrets.EC2_HOST }}:/tmp/client_dist

          # Replace the Nginx folder with the fresh build
          ssh -i ~/.ssh/ec2_key.pem ubuntu@${{ secrets.EC2_HOST }} "
          sudo rm -rf /var/www/html/client &&
          sudo cp -r /tmp/client_dist /var/www/html/client &&
          sudo rm -rf /tmp/client_dist &&
          sudo systemctl restart nginx
          "