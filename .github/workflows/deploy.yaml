name: Continuous Deployment (AWS EC2)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: SSH and Deploy application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Starting idempotent deployment to AWS EC2..."
            
            # 1. Create deployment directory idempotently (doesn't fail if exists)
            mkdir -p /var/www/shopsmart
            cd /var/www/shopsmart
            
            # 2. Safely clone OR pull depending on current state
            if [ -d ".git" ]; then
              echo "Repository exists. Pulling latest code..."
              # Hard reset ensures it doesn't fail due to local modifications
              git reset --hard HEAD
              git pull origin main
            else
              echo "Repository missing. Cloning..."
              git clone https://github.com/Dadi-Dinesh/shopsmart.git .
            fi
            
            # 3. Build the React Frontend Client
            echo "Building frontend client..."
            cd client
            npm ci
            npm run build
            
            # 4. Install Backend Server dependencies
            echo "Installing backend dependencies..."
            cd ../server
            npm ci
            
            # 5. Restart Backend Process Idempotently
            # Check if PM2 is currently managing the process
            if pm2 describe shopsmart-backend > /dev/null 2>&1; then
              echo "Restarting existing PM2 process..."
              pm2 restart shopsmart-backend
            else
              echo "Starting new PM2 process..."
              pm2 start src/index.js --name "shopsmart-backend"
            fi
            
            echo "Deployment completed successfully!"
