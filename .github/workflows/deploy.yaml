name: Deploy ShopSmart to EC2 (Ubuntu + Nginx)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (for frontend build)
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: ./client
        run: |
          npm install
          npm run build

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

      - name: Add EC2 Host to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy ShopSmart to EC2
        run: |
            # Copy all deployment artifacts over SCP
            scp -i ~/.ssh/ec2_key.pem -r client/dist ubuntu@${{ secrets.EC2_HOST }}:/tmp/client_dist
            scp -i ~/.ssh/ec2_key.pem infra/nginx.conf ubuntu@${{ secrets.EC2_HOST }}:/tmp/nginx.conf
            
            # Pack and copy server code
            tar -czf server.tar.gz --exclude=node_modules server
            scp -i ~/.ssh/ec2_key.pem server.tar.gz ubuntu@${{ secrets.EC2_HOST }}:/tmp/server.tar.gz
            
            # Copy the deployment script itself
            scp -i ~/.ssh/ec2_key.pem scripts/deploy_app.sh ubuntu@${{ secrets.EC2_HOST }}:/tmp/deploy_app.sh

            # Execute the deployment script on the server
            ssh -i ~/.ssh/ec2_key.pem ubuntu@${{ secrets.EC2_HOST }} "
            chmod +x /tmp/deploy_app.sh &&
            /tmp/deploy_app.sh &&
            rm /tmp/deploy_app.sh
            "